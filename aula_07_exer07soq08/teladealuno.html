<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELA DE ALUNO</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <h3>TELA DE ALUNO</h3>
    <form action="#">
        <label for="name">Nome:</label>
        <input type="text" id="name" size="60" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" size="60" required>
        <br><br>
        <label for="age">Idade:</label>
        <input type="number" id="age">
        <label for="age">CEP:</label>
        <input type="text" id="age" size="32" required>
        <br><br>
        <label for="password">Senha:</label>
        <input type="password" id="password" size="60" required>
        <br><br>
        <input type="submit" value="LOGIN">
    </form>
</body>
</html>
