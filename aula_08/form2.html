<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forma meu Ulario</title>
</head>
<body>
    <form action="#">
        <label for="username">Nome: </label>
        <input type="text"name="n_username"id="username">
        <br><br>
        <label for="telephone">Telefone: </label>
        <input type="number"name="n_telephone"id="telephone">
        <br><br>
        <label for="email">Email: </label>
        <input type="email"name="n_email"id="email">
        <br><br>
        <input type="submit"name="n_submit"id="submit"value="Mandar para os EUA">
    </form>
</body>
</html>
